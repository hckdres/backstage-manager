name: Validacion FIS - Java CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: ☕ Configurar JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Compilar y ejecutar pruebas
        run: mvn -B clean verify

      # Generar reporte visual en GitHub de las pruebas unitarias (JUnit)
      - name: Generar reporte de resultados de pruebas
        uses: mikepenz/action-junit-report@v5
        if: success() || failure() # Garantiza que el reporte se genere aunque falle un test
        with:
          report_paths: '**/target/surefire-reports/TEST-*.xml'

      # Generar reporte de cobertura de código en los PRs (JaCoCo)
      - name: Generar un reporte de cobertura de pruebas
        uses: PavanMudigonda/jacoco-reporter@v4.8
        with:
          coverage_results_path: 'target/site/jacoco/jacoco.xml'
          coverage_report_title: 'Test coverage results'
          coverage_report_name: 'Test coverage results'
          github_token: ${{ secrets.GITHUB_TOKEN }}